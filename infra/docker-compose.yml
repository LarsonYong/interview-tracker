services:
  db:
    image: postgres:15-alpine
    container_name: interview-tracker-db
    restart: always
    environment:
      POSTGRES_USER: jianbo_admin
      POSTGRES_PASSWORD: your_secure_password  # You can change this later
      POSTGRES_DB: interview_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: